print_freq: 1000
output_dir: ./outputs/default
checkpoint_freq: 120
plot_train_batch_freq: 200

sync_bn: True
find_unused_parameters: True
verbose_type: progress

use_amp: False
scaler:
  type: GradScaler
  enabled: True

use_ema: False
ema:
  type: ModelEMA
  decay: 0.9999
  warmups: 1000
  start: 0

cache_imgsz: 960
ram_cache: False
