# SDQ-CGRF for UAV small-object detection.
# P2/DSPR is used only to propose sparse detail queries; decoder values remain P3-P5.
backbone:
  # [from, module, args]
  - [-1, StemBlock, [16, 16, True]] # 0-P2/4
  - [-1, HG_Stage, [16, 64, 1, 3, False, False, 3, True, 'se']] # 1-P2/4
  - [-1, HG_Stage, [32, 256, 1, 3, True, False, 3, True, 'se']] # 2-P3/8
  - [-1, HG_Stage, [64, 512, 2, 3, True, True, 5, True, 'se']] # 3-P4/16
  - [-1, HG_Stage, [128, 1024, 1, 3, True, True, 5, True, 'se']] # 4-P5/32

encoder:
  - [[1, 2], DSPR, [128, 0.20, 0.50, True]] # 5-detail proxy, stride 4
  - [2, ConvNormLayer_fuse, [256, 1, 1]] # 6-P3/8
  - [3, ConvNormLayer_fuse, [256, 1, 1]] # 7-P4/16
  - [4, ConvNormLayer_fuse, [256, 1, 1]] # 8-P5/32

  - [[6, 5], CGRF, [256, 0.50, False]] # 9-P3/8
  - [[7, 5], CGRF, [256, 0.50, False]] # 10-P4/16
  - [8, TransformerEncoderBlock, [8, 1024, 0.1, "relu", 10000, False]] # 11-P5/32

  - [-1, ConvNormLayer_fuse, [256, 1, 1]] # 12
  - [-1, nn.Upsample, [None, 2, "nearest"]] # 13
  - [[-1, 10], Concat, []] # 14-P4/16
  - [-1, RepNCSPELAN4, [256, 512, 64, 1, False, 'silu']] # 15-P4/16

  - [-1, ConvNormLayer_fuse, [256, 1, 1]] # 16
  - [-1, nn.Upsample, [None, 2, "nearest"]] # 17
  - [[-1, 9], Concat, []] # 18-P3/8
  - [-1, RepNCSPELAN4, [256, 512, 64, 1, False, 'silu']] # 19-P3/8

  - [-1, SCDown, [256, 3, 2, 'silu']] # 20-P4/16
  - [[-1, 16], Concat, []] # 21-P4/16
  - [-1, RepNCSPELAN4, [256, 512, 64, 1, False, 'silu']] # 22-P4/16

  - [-1, SCDown, [256, 3, 2, 'silu']] # 23-P5/32
  - [[-1, 12], Concat, []] # 24-P5/32
  - [-1, RepNCSPELAN4, [256, 512, 64, 1, False, 'silu']] # 25-P5/32

decoder:
  - [[5, 19, 22, 25], DFINETransformer, {"feat_strides":[4, 8, 16, 32], "hidden_dim": 256, "num_levels": 3, "num_layers": 3, "num_points": [3, 6, 3], "dim_feedforward": 1024, "sdq_levels": 1, "sdq_pre_topk": 1024, "sdq_query_topk": 96, "sdq_grid_size": 0.025}]
