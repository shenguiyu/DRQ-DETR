# SDQ-only ablation for UAV small-object detection.
# DSPR provides sparse detail-query candidates, while value features remain
# the regular P3-P5 pyramid without CGRF detail fusion.
backbone:
  # [from, module, args]
  - [-1, StemBlock, [16, 16, True]] # 0-P2/4
  - [-1, HG_Stage, [16, 64, 1, 3, False, False, 3, True, 'se']] # 1-P2/4
  - [-1, HG_Stage, [32, 256, 1, 3, True, False, 3, True, 'se']] # 2-P3/8
  - [-1, HG_Stage, [64, 512, 2, 3, True, True, 5, True, 'se']] # 3-P4/16
  - [-1, HG_Stage, [128, 1024, 1, 3, True, True, 5, True, 'se']] # 4-P5/32

encoder:
  - [[1, 2], DSPR, [128, 0.20, 0.50, True]] # 5-SDQ detail proxy, stride 4
  - [2, ConvNormLayer_fuse, [256, 1, 1]] # 6-P3/8
  - [3, ConvNormLayer_fuse, [256, 1, 1]] # 7-P4/16
  - [4, ConvNormLayer_fuse, [256, 1, 1]] # 8-P5/32

  - [8, TransformerEncoderBlock, [8, 1024, 0.1, "relu", 10000, False]] # 9-P5/32

  - [-1, ConvNormLayer_fuse, [256, 1, 1]] # 10-P5 lateral
  - [-1, nn.Upsample, [None, 2, "nearest"]] # 11
  - [[-1, 7], Concat, []] # 12-P4/16
  - [-1, RepNCSPELAN4, [256, 512, 64, 1, False, 'silu']] # 13-P4/16

  - [-1, ConvNormLayer_fuse, [256, 1, 1]] # 14-P4 lateral
  - [-1, nn.Upsample, [None, 2, "nearest"]] # 15
  - [[-1, 6], Concat, []] # 16-P3/8
  - [-1, RepNCSPELAN4, [256, 512, 64, 1, False, 'silu']] # 17-P3/8

  - [-1, SCDown, [256, 3, 2, 'silu']] # 18-P4/16
  - [[-1, 14], Concat, []] # 19-P4/16
  - [-1, RepNCSPELAN4, [256, 512, 64, 1, False, 'silu']] # 20-P4/16

  - [-1, SCDown, [256, 3, 2, 'silu']] # 21-P5/32
  - [[-1, 10], Concat, []] # 22-P5/32
  - [-1, RepNCSPELAN4, [256, 512, 64, 1, False, 'silu']] # 23-P5/32

decoder:
  - [[5, 17, 20, 23], DFINETransformer, {"feat_strides":[4, 8, 16, 32], "hidden_dim": 256, "num_levels": 3, "num_layers": 3, "num_points": [3, 6, 3], "dim_feedforward": 1024, "sdq_levels": 1, "sdq_pre_topk": 1536, "sdq_query_topk": 96, "sdq_grid_size": 0.025}]
